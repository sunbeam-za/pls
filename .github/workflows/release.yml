name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifacts: |
              dist/pls-*.dmg
              dist/pls-*.dmg.blockmap
              dist/latest-mac.yml
          - os: windows-latest
            script: build:win
            artifacts: |
              dist/pls-*-setup.exe
              dist/pls-*-setup.exe.blockmap
              dist/latest.yml
          - os: ubuntu-latest
            script: build:linux
            artifacts: |
              dist/pls-*.AppImage
              dist/pls_*.deb
              dist/pls_*.snap
              dist/latest-linux.yml

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: install deps
        run: npm ci

      - name: sync package.json version to release tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "release tag: $TAG → version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: build
        run: npm run ${{ matrix.script }}
        env:
          # No Developer ID cert in CI — electron-builder falls through to
          # ad-hoc signing on macOS arm64, which is required for the bundle
          # to load (otherwise the prebuilt Electron Framework's Team ID
          # mismatches the unsigned main binary and dyld refuses to load it).
          # Add APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
          # secrets later to enable real signing + notarization on macOS.
          CSC_IDENTITY_AUTO_DISCOVERY: true

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false
