name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifacts: |
              dist/pls-*.dmg
              dist/pls-*.dmg.blockmap
              dist/latest-mac.yml
          - os: windows-latest
            script: build:win
            artifacts: |
              dist/pls-*-setup.exe
              dist/pls-*-setup.exe.blockmap
              dist/latest.yml
          - os: ubuntu-latest
            script: build:linux
            artifacts: |
              dist/pls-*.AppImage
              dist/pls_*.deb
              dist/pls_*.snap
              dist/latest-linux.yml

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: install deps
        run: npm ci

      - name: build
        run: npm run ${{ matrix.script }}
        env:
          # ad-hoc unsigned build. add APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
          # APPLE_TEAM_ID secrets later to enable notarization on macos.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          generate_release_notes: true
          fail_on_unmatched_files: false
